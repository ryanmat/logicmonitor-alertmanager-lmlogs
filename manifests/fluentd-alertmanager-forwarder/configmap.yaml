# Description: Fluentd config for the AlertManager forwarder Deployment.
# Description: Receives AlertManager webhook POSTs, enriches, re-emits to LM Ingest with device resolution.
apiVersion: v1
kind: ConfigMap
metadata:
  name: lm-logs-forwarder-config
  labels:
    app.kubernetes.io/name: lm-logs-forwarder
    app.kubernetes.io/component: alertmanager-forwarder
data:
  fluent.conf: |
    <system>
      log_level "#{ENV['FLUENT_LOG_LEVEL'] || 'info'}"
    </system>

    # Receive AlertManager webhook POSTs. The URL path segment becomes the event tag
    # (e.g. POST /alertmanager.webhook -> tag "alertmanager.webhook").
    <source>
      @type http
      port 9880
      bind 0.0.0.0
      body_size_limit 10m
      keepalive_timeout 30s
      add_http_headers false
      add_remote_addr false
      <parse>
        @type json
      </parse>
    </source>

    # Liveness / readiness probe target. Returns 200 to TCP checks without recording events.
    <source>
      @type monitor_agent
      bind 0.0.0.0
      port 24220
    </source>

    # Extract pod and namespace from the first alert's labels so the LM Ingest path
    # can bind each log to the matching k8s pod device. Stash the raw JSON as the
    # message body and tag the event source for easy LMQL filtering.
    <filter alertmanager.**>
      @type record_transformer
      enable_ruby
      <record>
        alert_pod ${record.dig('alerts', 0, 'labels', 'pod')}
        alert_namespace ${record.dig('alerts', 0, 'labels', 'namespace')}
        cluster_name "#{ENV['CLUSTER_NAME']}"
        event_source "alertmanager"
        message ${record.to_json}
      </record>
    </filter>

    # Forward to LM Ingest. The two-key resource_mapping (auto.name + auto.namespace)
    # combined with _resource.type=k8s is the documented contract that binds the log
    # to an existing k8s pod device, which populates the Resource column in LM Logs.
    # Alerts without a pod label still index (cluster_name carries identity in the
    # message body) but the Resource column remains empty for those rows.
    <match alertmanager.**>
      @type lm
      company_name "#{ENV['LM_COMPANY_NAME']}"
      bearer_token "#{ENV['LM_BEARER_TOKEN']}"
      resource_type "k8s"
      resource_mapping {"alert_pod": "auto.name", "alert_namespace": "auto.namespace"}
      compression gzip
      debug false
      include_metadata true
      <buffer>
        @type memory
        flush_interval 1s
        chunk_limit_size 5m
        flush_thread_count 4
        total_limit_size 256m
        retry_type exponential_backoff
        retry_max_interval 60s
        retry_forever false
        retry_max_times 5
      </buffer>
    </match>
