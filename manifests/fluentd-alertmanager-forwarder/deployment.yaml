# Description: Fluentd Deployment that receives AlertManager webhooks and forwards to LM Ingest.
# Description: Runs a single HTTP receiver on port 9880 behind the lm-logs-forwarder Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lm-logs-forwarder
  labels:
    app.kubernetes.io/name: lm-logs-forwarder
    app.kubernetes.io/component: alertmanager-forwarder
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: lm-logs-forwarder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lm-logs-forwarder
        app.kubernetes.io/component: alertmanager-forwarder
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: fluentd
          image: logicmonitor/lm-logs-k8s-fluentd:1.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9880
              protocol: TCP
            - name: monitor
              containerPort: 24220
              protocol: TCP
          env:
            - name: CLUSTER_NAME
              value: "REPLACE_WITH_CLUSTER_NAME"
            - name: LM_COMPANY_NAME
              value: "REPLACE_WITH_PORTAL_NAME"
            - name: LM_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logicmonitor-bearer-token
                  key: token
            - name: FLUENT_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 9880
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 9880
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
          volumeMounts:
            - name: fluentd-config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
              readOnly: true
            - name: fluentd-buffer
              mountPath: /var/log/fluentd
      volumes:
        - name: fluentd-config
          configMap:
            name: lm-logs-forwarder-config
        - name: fluentd-buffer
          emptyDir: {}
